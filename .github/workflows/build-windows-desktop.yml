name: Build Windows Desktop EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/build-windows-desktop.yml"

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create backend virtualenv
        run: python -m venv backend\venv

      - name: Install backend dependencies
        run: |
          backend\venv\Scripts\python.exe -m pip install --upgrade pip
          backend\venv\Scripts\python.exe -m pip install -r backend\requirements.txt
          backend\venv\Scripts\python.exe -m pip install "pyinstaller>=6.0.0"

      - name: Generate desktop assets
        working-directory: frontend
        run: npm run assets:desktop

      - name: Build embedded backend
        working-directory: frontend
        run: npm run backend:build

      - name: Build desktop frontend
        working-directory: frontend
        run: npm run build:desktop

      - name: Build Windows installer
        working-directory: frontend
        run: npx electron-builder --win

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-creative-platform-windows-exe
          path: |
            frontend/release/*.exe
            frontend/release/*.blockmap
            frontend/release/builder-*.yml
          if-no-files-found: error

      - name: Upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ai-creative-platform-windows-build-diagnostics
          path: |
            frontend/release/**
            frontend/.pyinstaller-build/**
            frontend/.pyinstaller-spec/**
          if-no-files-found: ignore
